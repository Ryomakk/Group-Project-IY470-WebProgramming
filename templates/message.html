<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: rgb(55, 54, 54);
        }
        .message-box {
            background: rgb(255, 255, 255);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        .message-box h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .message-box p {
            color: #666;
            margin-bottom: 30px;
        }
        .message-box a {
            display: inline-block;
            padding: 12px 30px;
            background: #4184f0;
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h2>Notice</h2>
        <p>{{ message }}</p>
        <a href="{{ redirect_url }}">Continue</a>
    </div>
</body>
</html>
