<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<title>Login</title>
</head>
<body>
    <div class="login_background">
        <form method="post" action="{{ url_for('account_page') }}" id="login" class="login_form">
            <div class="centerlogin">LOGIN</div>
            
            <div class="pair">
                <div class="input-container">
                    <input type="text" id="membership" name="membership" placeholder=" " required>
                    <label for="membership">Email or Membership ID</label>
                </div>
                
                <!-- Password with eye icon -->
                <div class="input-container password-wrapper">
                    <input type="password" id="password" name="pass_word" placeholder=" " pattern=".{8,10}" required>
                    <label for="password">Password</label>
                    <span id="eyeIcon" onclick="togglePassword()">👁️</span>
                </div>
                
                <button type="submit">Login</button>
            </div>
            
            <div class="create_account">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign up here!</a>
            </div>
        </form>
    </div>

<script>
    // Expand form animation on load
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("login").classList.add("open");
    });
    
    // Toggle password visibility
    function togglePassword() {
        var pwd = document.getElementById("password");
        var icon = document.getElementById("eyeIcon");
        if (pwd.type === "password") {
            pwd.type = "text";
            icon.textContent = "🙈";
        } else {
            pwd.type = "password";
            icon.textContent = "👁️";
        }
    }
</script>
</body>
</html>
